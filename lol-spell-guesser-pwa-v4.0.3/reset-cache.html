<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#091420">
  <title>Aggiornamento LoL Spell Guesser</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#010a13;color:#f0e6d2;font-family:system-ui,-apple-system,sans-serif;text-align:center;padding:24px;box-sizing:border-box}
    main{max-width:480px;background:#091420;border:1px solid #785a28;border-radius:12px;padding:24px;box-shadow:0 12px 40px #0008}
    h1{color:#c8aa6e;font-size:24px}.spinner{width:38px;height:38px;margin:18px auto;border:4px solid #ffffff18;border-left-color:#c8aa6e;border-radius:50%;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<main>
  <h1>Aggiornamento alla 4.0.3</h1>
  <p id="status">Pulizia completa della vecchia cache…</p>
  <div class="spinner"></div>
</main>
<script>
(async () => {
  const status = document.getElementById('status');
  try {
    if ('serviceWorker' in navigator) {
      const registrations = await navigator.serviceWorker.getRegistrations();
      await Promise.all(registrations.map(reg => reg.unregister()));
    }
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(key => caches.delete(key)));
    }
    status.textContent = 'Cache eliminata. Apertura della versione 4.0.3…';
  } catch (error) {
    status.textContent = 'Apertura della versione 4.0.3…';
  }
  location.replace('./?v=4.0.3&cache_reset=' + Date.now());
})();
</script>
</body>
</html>
